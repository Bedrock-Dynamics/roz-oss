name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Pinned to commit SHA per Phase 14 REVIEWS.md MEDIUM (was @master).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy

      # Pinned to commit SHA per Phase 14 REVIEWS.md MEDIUM (was @v2).
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  # Phase 14 REVIEWS.md HIGH: the wasm_signature_integration tests added by
  # Plan 14-02 require --features aot to compile. Without this job, those
  # tests are orphaned from PR CI — they'd only run in the nightly workflow.
  # This job closes that gap so every PR exercises the AOT signature path.
  aot-tests:
    name: roz-copper --features aot
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Compiles + runs ALL roz-copper tests that require the `aot`
      # feature, including `wasm_signature_integration` (Phase 14 /
      # 14-02). Non-#[ignore] tests here run every PR — they MUST
      # pass in under a few seconds each.
      #
      # The #[ignore]-tagged NATS emission test inside that file is
      # skipped here (it requires a NATS testcontainer) and runs in
      # the nightly integration-aot job.
      - name: Run aot-feature tests
        run: cargo test -p roz-copper --features aot

      # Clippy on the aot code path too — the #[cfg(feature="aot")]
      # branch of from_precompiled must lint clean on every PR.
      - name: Clippy (aot feature)
        run: cargo clippy -p roz-copper --features aot --tests -- -D warnings

  # Phase 15 (zenoh-edge-transport) D-29: the `--features zenoh` build path
  # on roz-worker and the integration tests in roz-zenoh/tests (which require
  # a zenohd testcontainer) are NOT exercised by the default `cargo build
  # --workspace` / `cargo test --workspace` steps. This job closes that gap so
  # every PR compiles + lints + runs the zenoh path alongside the default.
  zenoh-tests:
    name: roz-worker --features zenoh + roz-zenoh integration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.92.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # Docker is required for the roz-zenoh integration tests (zenohd
      # testcontainer, see crates/roz-test/src/zenoh.rs). ubuntu-latest
      # GitHub runners ship Docker; this step fails fast with a clear
      # message if that ever changes.
      - name: Docker available
        run: docker info

      - name: Build roz-worker with --features zenoh
        run: cargo build -p roz-worker --features zenoh

      - name: Clippy roz-worker with --features zenoh
        run: cargo clippy -p roz-worker --all-targets --features zenoh -- -D warnings

      - name: Test roz-worker with --features zenoh
        run: cargo test -p roz-worker --features zenoh

      # ZEN-01/02/03/04 + T-01 end-to-end coverage lives in
      # crates/roz-zenoh/tests/*_integration.rs and runs in the default
      # cargo test matrix per D-29 (no `#[ignore]`).
      - name: Test roz-zenoh (integration tests require Docker)
        run: cargo test -p roz-zenoh --all-targets
