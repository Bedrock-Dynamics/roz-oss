name: live-models

# Plan 19-14: runs the #[ignore]-gated vLLM live smoke suite from
# `crates/roz-openai/tests/live_smoke.rs` against an in-runner Ollama service.
#
# vLLM is too heavy for stock GitHub runners (CUDA, 4+ GB model weights). Ollama
# serves the same OpenAI Chat Completions v1 wire, so the smoke suite exercises
# the identical code path end-to-end. Developers can run against a real vLLM
# locally by setting VLLM_BASE_URL.
#
# Gating: opt-in only. Triggers are (a) PR labeled `live-models`, (b) nightly
# cron at 07:00 UTC, (c) manual workflow_dispatch.

on:
  pull_request:
    types: [labeled]
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  vllm-smoke:
    name: vLLM live smoke (via Ollama)
    # Skip on `labeled` events unless the label is `live-models`. Cron and
    # workflow_dispatch events always run.
    if: >
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'live-models')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # OpenAI-compatible OSS server. Wire-compatible with vLLM's Chat
      # Completions endpoint on `/v1/chat/completions`.
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    env:
      VLLM_BASE_URL: http://localhost:11434/v1
      VLLM_MODEL: llama3.2:1b
      VLLM_API_KEY: sk-ci-placeholder

    steps:
      - uses: actions/checkout@v4

      # Pinned to commit SHA per Phase 14 REVIEWS.md MEDIUM (was @master).
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: "1.92.0"

      # Pinned to commit SHA per Phase 14 REVIEWS.md MEDIUM (was @v2).
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Wait for Ollama to accept connections
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:11434/api/version >/dev/null 2>&1; then
              echo "Ollama up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Ollama did not come up within 60s" >&2
          exit 1

      - name: Pull Ollama model (llama3.2:1b)
        run: |
          curl -fsS http://localhost:11434/api/pull \
            -H 'Content-Type: application/json' \
            -d '{"name":"llama3.2:1b"}'

      - name: Run live smoke
        run: cargo test -p roz-openai --test live_smoke -- --ignored --nocapture
