syntax = "proto3";

package roz.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// D-09: Task status values mirror the roz_tasks.status enum declared in
// migrations/021_task_timeout_status.sql:
//   'pending', 'queued', 'provisioning', 'running', 'succeeded',
//   'failed', 'timed_out', 'cancelled', 'safety_stop', 'retrying'.
// Proto3 requires an _UNSPECIFIED zero sentinel.
enum TaskStatus {
  TASK_STATUS_UNSPECIFIED  = 0;
  TASK_STATUS_PENDING      = 1;
  TASK_STATUS_QUEUED       = 2;
  TASK_STATUS_PROVISIONING = 3;
  TASK_STATUS_RUNNING      = 4;
  TASK_STATUS_SUCCEEDED    = 5;
  TASK_STATUS_FAILED       = 6;
  TASK_STATUS_TIMED_OUT    = 7;
  TASK_STATUS_CANCELLED    = 8;
  TASK_STATUS_SAFETY_STOP  = 9;
  TASK_STATUS_RETRYING     = 10;
}

// D-09: One emission per roz_tasks.status transition. Wrapped at the
// 3 UPDATE sites in crates/roz-db/src/tasks.rs.
message TaskLifecycleEvent {
  string task_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  TaskStatus prev_status = 3;
  TaskStatus new_status = 4;
  optional string reason = 5;
  optional string actor  = 6;
  // Phase 26.3 SC1: W3C trace context. See agent.proto SessionEventEnvelope.
  bytes trace_id = 100;
  bytes span_id  = 101;
}

// D-08: Field sets reuse agent.proto's ToolCall*Payload shapes verbatim
// but are re-declared here (not imported) to keep observability concerns
// isolated per D-07.
message ToolCallStarted {
  string tool_name = 1;
  string category  = 2;
}
message ToolCallRequested {
  string tool_name = 1;
  google.protobuf.Struct parameters = 2;
  uint32 timeout_ms = 3;
}
message ToolCallFinished {
  string tool_name = 1;
  string result_summary = 2;
}

// D-08: Single envelope, single channel /roz/tool/calls. Mirrors
// SessionEventEnvelope's oneof pattern at agent.proto lines 352-401.
message ToolCallEvent {
  string call_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  oneof payload {
    ToolCallStarted   started   = 3;
    ToolCallRequested requested = 4;
    ToolCallFinished  finished  = 5;
  }
  // Phase 26.3 SC1: W3C trace context. See agent.proto SessionEventEnvelope.
  bytes trace_id = 100;
  bytes span_id  = 101;
}

// Phase 26 OBS-03: export endpoint.

// Time range for incremental MCAP export. Bounds use MCAP `log_time` nanoseconds
// (unix epoch). `start_ns` inclusive, `end_ns` exclusive. Either bound may be
// omitted to stream from file start / to file end.
message TimeRangeNs {
  optional uint64 start_ns = 1;
  optional uint64 end_ns = 2;
}

// OBS-03 ExportSession request: identifies the session and optional time-range.
message ExportSessionRequest {
  string session_id = 1;
  optional TimeRangeNs time_range = 2;
}

// OBS-03 ExportSession streaming chunk. `data` carries raw MCAP bytes
// (concatenated across rollover files). `archive_status` mirrors the
// `X-Roz-Mcap-Status` header (D-06) and is populated on the first chunk of
// each rollover file. `rollover_index` identifies which archive file the
// chunk belongs to (0 = base file, 1 = .001, ...).
message ExportSessionChunk {
  bytes data = 1;
  optional string archive_status = 2;
  optional uint32 rollover_index = 3;
}

// Phase 26.4 D-14: ReindexSession — reindex a single session's MCAP archives
// into roz_session_metadata + roz_session_tool_calls. RLS-scoped to the
// caller's tenant.
message ReindexSessionRequest {
  string session_id = 1;
}
message ReindexSessionResponse {
  uint32 tool_calls_indexed = 1;
  // true when the reindex created a new metadata row; false when it
  // updated an existing row.
  bool newly_created = 2;
}

// Phase 26.4 D-14: ReindexAll — admin-scoped bulk backfill across every
// tenant. Each indexed session emits one ReindexProgress; the stream ends
// when every session has been attempted.
message ReindexAllRequest {}

message ReindexProgress {
  string session_id = 1;
  uint32 completed  = 2;
  uint32 total      = 3;
  bool   succeeded  = 4;
  optional string error = 5;
  optional uint32 tool_calls_indexed = 6;
}

service ObservabilityService {
  // Server-streams the concatenated MCAP archive for the given session, in
  // rollover-index ascending order. When `time_range` is set, each file is
  // filtered via `mcap::MessageStream` before emission.
  rpc ExportSession (ExportSessionRequest) returns (stream ExportSessionChunk);

  // Phase 26.4 D-14: reindex one session. RLS-scoped to caller's tenant.
  rpc ReindexSession (ReindexSessionRequest) returns (ReindexSessionResponse);

  // Phase 26.4 D-14: reindex every session across every tenant. Admin-scoped
  // (caller must satisfy `AuthIdentity::is_admin()`); server iterates tenants
  // and emits one ReindexProgress per session attempted.
  rpc ReindexAll (ReindexAllRequest) returns (stream ReindexProgress);
}
