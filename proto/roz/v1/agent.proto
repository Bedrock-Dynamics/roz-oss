syntax = "proto3";

package roz.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

service AgentService {
  // Bidirectional streaming RPC for interactive agent sessions.
  // Client sends prompts and tool results. Server sends canonical SessionEvent
  // envelopes plus non-session side-channel messages (keepalive, WebRTC, cameras).
  rpc StreamSession(stream SessionRequest) returns (stream SessionResponse);

  // WatchTeam streams TeamEvent messages for all workers under a parent task.
  rpc WatchTeam(WatchTeamRequest) returns (stream TeamEvent);
}

// --- Client → Server ---

message SessionRequest {
  oneof request {
    StartSession start = 1;
    UserMessage user_message = 2;
    ToolResult tool_result = 3;
    CancelTurn cancel_turn = 4;
    CancelSession cancel_session = 5;
    Ping ping = 6;
    MessageFeedback feedback = 7;
    // D2: IDE sends user's Deny/Allow decision for a Roz-authoritative approval.
    PermissionDecision permission_decision = 8;
    // D3: IDE registers / unregisters dynamic tool sets (e.g. MCP sim tools).
    RegisterTools register_tools = 9;
    WebRtcAnswer webrtc_answer = 14;
    IceCandidate ice_candidate = 15;
    CameraRequest camera_request = 16;
  }
}

message StartSession {
  string environment_id = 1;
  optional string host_id = 2;
  optional string model = 3;
  repeated ToolSchema tools = 4;
  repeated ConversationMessage history = 5;
  repeated string project_context = 6;
  optional uint32 max_context_tokens = 7;
  optional AgentPlacement agent_placement = 8;
  repeated string camera_ids = 9;
  bool enable_video = 10;
}

enum AgentPlacement {
  AGENT_PLACEMENT_AUTO = 0;
  AGENT_PLACEMENT_CLOUD = 1;
  AGENT_PLACEMENT_EDGE = 2;
}

message ConversationMessage {
  string role = 1;
  repeated ContentPart parts = 2;
}

message ContentPart {
  oneof part {
    TextContent text = 1;
    ToolUseContent tool_use = 2;
    ToolResultContent tool_result = 3;
    ThinkingContent thinking = 4;
    ImageContent image = 5;
  }
}

message TextContent {
  string text = 1;
}

message ToolUseContent {
  string id = 1;
  string name = 2;
  google.protobuf.Struct input = 3;
}

message ToolResultContent {
  string tool_use_id = 1;
  string name = 2;
  string content = 3;
  bool is_error = 4;
}

message ThinkingContent {
  string thinking = 1;
  string signature = 2;
}

message ImageContent {
  string media_type = 1;
  bytes data = 2;
}

message UserMessage {
  string content = 1;
  repeated ContentBlock context = 2;
  optional string ai_mode = 3;
  // Client-generated message ID echoed back in canonical turn events
  // (`text_delta`, `thinking_delta`, `turn_finished`). If omitted, server generates one.
  optional string message_id = 4;
  // D3b: Complete tool snapshot for this turn. When present, Roz uses these
  // instead of session-accumulated tools (RegisterTools / StartSession.tools).
  // IDE should send the full current MCP tool set on every UserMessage.
  repeated ToolSchema tools = 5;
  // D3b: Workflow context for this turn (replaces RegisterTools.system_context).
  // Injected as a system block prepended to this turn only.
  optional string system_context = 6;
}

message ContentBlock {
  oneof block {
    string text = 1;
    BinaryContent binary = 2;
  }
  optional string label = 3;
}

message BinaryContent {
  string mime_type = 1;
  bytes data = 2;
}

message ToolResult {
  string tool_call_id = 1;
  // Logical success: true if the tool completed its intended action.
  // When exit_code is present, success MUST equal (exit_code == 0).
  // For non-shell tools with no meaningful exit code, set success directly
  // and leave exit_code absent.
  bool success = 2;
  string result = 3;
  // Structured metadata from tool execution (added in D1).
  // exit_code: shell exit code (0 = success, non-zero = failure).
  // truncated: output was cut off due to size limits.
  // duration_ms: wall-clock execution time in milliseconds.
  optional int32 exit_code = 4;
  bool truncated = 5;
  optional int64 duration_ms = 6;
}

message CancelTurn {
  string reason = 1;
}

message CancelSession {
  string reason = 1;
}

message Ping {}

message MessageFeedback {
  string session_id = 1;
  string message_id = 2;
  string rating = 3; // "up" or "down"
}

// D2: IDE response to a Roz-authoritative tool approval request.
// Sent when the user clicks Deny/Allow in the IDE popover.
message PermissionDecision {
  // The approval_id from the canonical approval/session event that triggered
  // the popover. Roz uses this to unblock the waiting agent turn.
  string approval_id = 1;
  bool approved = 2;
  optional google.protobuf.Struct modifier = 3;
}

// D3: Dynamically register or unregister a named set of tools mid-session.
//
// Typical use: IDE proxy connects to a Docker sim container's MCP server,
// fetches its tool manifest, then sends RegisterTools to add those tools
// to the running Roz session.  When the container stops, the IDE sends
// RegisterTools with tools=[] and the same source to unregister them.
//
// source  — identifies the tool set owner (e.g. a container short ID).
//           All previously-registered tools whose name starts with
//           "{source}__" are removed before the new list is appended.
// tools   — replacement list for this source.  Empty list = unregister.
// system_context — optional workflow guidance for this source (MCP Prompt
//           "substrate:workflow").  Injected as a system block on the next
//           UserMessage turn.
message RegisterTools {
  optional string source = 1;
  repeated ToolSchema tools = 2;
  optional string system_context = 3;
}

// --- Server → Client ---

message SessionResponse {
  // Fields 1-6 were never assigned. Fields 9-13 were reserved for future
  // server→client variants but never allocated; reserved here for
  // forward-compatibility safety.
  reserved 1 to 6, 9 to 13;
  oneof response {
    Keepalive keepalive = 7;
    Pong pong = 8;
    TelemetryUpdate telemetry = 14;
    TaskProgress task_progress = 15;
    WebRtcOffer webrtc_offer = 16;
    IceCandidate ice_candidate = 17;
    CameraUpdate camera_update = 18;
    SessionEventEnvelope session_event = 19;
  }
}

message SessionEventEnvelope {
  string event_id = 1;
  string correlation_id = 2;
  optional string parent_event_id = 3;
  google.protobuf.Timestamp timestamp = 4;
  string event_type = 5;
  reserved 6;
  oneof typed_event {
    SessionStartedPayload session_started = 7;
    SessionRejectedPayload session_rejected = 8;
    SessionFailedPayload session_failed = 9;
    TextDeltaPayload text_delta = 10;
    ThinkingDeltaPayload thinking_delta = 11;
    TurnFinishedPayload turn_finished = 12;
    ToolCallStartedPayload tool_call_started = 13;
    ToolCallRequestedPayload tool_call_requested = 14;
    ToolCallFinishedPayload tool_call_finished = 15;
    SafePauseEnteredPayload safe_pause_entered = 16;
    ActivityChangedPayload activity_changed = 17;
    PresenceHintedPayload presence_hinted = 18;
    TurnStartedPayload turn_started = 19;
    SessionCompletedPayload session_completed = 20;
    ContextCompactedPayload context_compacted = 21;
    ToolUnavailablePayload tool_unavailable = 22;
    ApprovalRequestedPayload approval_requested = 23;
    ApprovalResolvedPayload approval_resolved = 24;
    SafePauseClearedPayload safe_pause_cleared = 25;
    ControllerLoadedPayload controller_loaded = 26;
    ControllerShadowStartedPayload controller_shadow_started = 27;
    ControllerPromotedPayload controller_promoted = 28;
    ControllerRolledBackPayload controller_rolled_back = 29;
    SafetyInterventionPayload safety_intervention = 30;
    EdgeTransportDegradedPayload edge_transport_degraded = 31;
    VerificationStartedPayload verification_started = 32;
    VerificationFinishedPayload verification_finished = 33;
    ResumeSummaryPayload resume_summary = 34;
    TelemetryStatusChangedPayload telemetry_status_changed = 35;
    TrustPostureChangedPayload trust_posture_changed = 36;
    ReasoningTracePayload reasoning_trace = 37;
    ModelCallCompletedPayload model_call_completed = 38;
    MemoryReadPayload memory_read = 39;
    MemoryWritePayload memory_write = 40;
    SensorRepositionedPayload sensor_repositioned = 41;
    ContactStateChangedPayload contact_state_changed = 42;
    FeedbackReceivedPayload feedback_received = 43;
  }
}

message SessionPermissionRulePayload {
  string tool_pattern = 1;
  string policy = 2;
  optional string category = 3;
  optional string reason = 4;
}

message SessionStartedPayload {
  string session_id = 1;
  string mode = 2;
  string blueprint_version = 3;
  optional string model_name = 4;
  repeated SessionPermissionRulePayload permissions = 5;
}

message SessionRejectedPayload {
  string code = 1;
  string message = 2;
  bool retryable = 3;
}

message SessionFailedPayload {
  string failure = 1;
}

message TurnStartedPayload {
  uint32 turn_index = 1;
}

message SessionCompletedPayload {
  string summary = 1;
  uint64 input_tokens = 2;
  uint64 output_tokens = 3;
}

message TextDeltaPayload {
  string content = 1;
  optional string message_id = 2;
}

message ThinkingDeltaPayload {
  string content = 1;
  optional string message_id = 2;
}

message TurnFinishedPayload {
  uint32 input_tokens = 1;
  uint32 output_tokens = 2;
  uint32 cache_creation_tokens = 3;
  uint32 cache_read_tokens = 4;
  string stop_reason = 5;
  optional string message_id = 6;
}

message ToolCallStartedPayload {
  string call_id = 1;
  string tool_name = 2;
  string category = 3;
}

message ToolCallRequestedPayload {
  string call_id = 1;
  string tool_name = 2;
  google.protobuf.Struct parameters = 3;
  uint32 timeout_ms = 4;
}

message ToolCallFinishedPayload {
  string call_id = 1;
  string tool_name = 2;
  string result_summary = 3;
}

message ToolUnavailablePayload {
  string tool_name = 1;
  string reason = 2;
}

message ApprovalRequestedPayload {
  string approval_id = 1;
  string action = 2;
  string reason = 3;
  uint64 timeout_secs = 4;
}

message ApprovalResolvedPayload {
  string approval_id = 1;
  google.protobuf.Struct outcome = 2;
}

message SafePauseEnteredPayload {
  string reason = 1;
  string robot_state = 2;
}

message SafePauseClearedPayload {
  string reason = 1;
}

message ActivityChangedPayload {
  string state = 1;
  string reason = 2;
  bool robot_safe = 3;
  optional string unblock_event = 4;
}

message PresenceHintedPayload {
  string level = 1;
  string reason = 2;
}

message ContextCompactedPayload {
  string level = 1;
  uint32 messages_affected = 2;
  uint32 tokens_before = 3;
  uint32 tokens_after = 4;
}

message ControllerLoadedPayload {
  string artifact_id = 1;
  string source_kind = 2;
}

message ControllerShadowStartedPayload {
  string artifact_id = 1;
}

message ControllerPromotedPayload {
  string artifact_id = 1;
  optional string replaced_id = 2;
}

message ControllerRolledBackPayload {
  string artifact_id = 1;
  string restored_id = 2;
  string reason = 3;
}

message SafetyInterventionPayload {
  string channel = 1;
  double raw_value = 2;
  double clamped_value = 3;
  string kind = 4;
  string reason = 5;
}

message EdgeTransportDegradedPayload {
  string transport = 1;
  google.protobuf.Struct health = 2;
  repeated string affected_capabilities = 3;
}

message VerificationStartedPayload {
  string target = 1;
  string verifier_kind = 2;
}

message VerificationFinishedPayload {
  string target = 1;
  google.protobuf.Struct verdict = 2;
  optional google.protobuf.Struct evidence = 3;
  string verdict_kind = 4;
  optional string verifier_status = 5;
  optional string verifier_reason = 6;
  optional string evidence_bundle_id = 7;
  optional uint64 frame_snapshot_id = 8;
  optional string execution_mode = 9;
}

message ResumeSummaryPayload {
  google.protobuf.Struct summary = 1;
}

message TelemetryStatusChangedPayload {
  string freshness = 1;
  repeated string degraded_sources = 2;
}

message TrustPostureChangedPayload {
  google.protobuf.Struct old = 1;
  google.protobuf.Struct new = 2;
  string reason = 3;
}

message ReasoningTracePayload {
  uint32 turn_index = 1;
  uint32 cycle_index = 2;
  optional string thinking_summary = 3;
  string selected_action = 4;
  repeated string alternatives_considered = 5;
  repeated string observation_ids = 6;
}

message ModelCallCompletedPayload {
  string model_id = 1;
  string provider = 2;
  uint32 input_tokens = 3;
  uint32 output_tokens = 4;
  uint64 latency_ms = 5;
  uint32 cache_hit_tokens = 6;
  string stop_reason = 7;
}

message MemoryReadPayload {
  uint32 entries_returned = 1;
  string scope_key = 2;
  uint32 total_tokens = 3;
}

message MemoryWritePayload {
  string memory_id = 1;
  string class = 2;
  string scope_key = 3;
  string source_kind = 4;
}

message SensorRepositionedPayload {
  string sensor_id = 1;
  google.protobuf.Struct old_pose = 2;
  google.protobuf.Struct new_pose = 3;
  google.protobuf.Struct goal = 4;
}

message ContactStateChangedPayload {
  string link = 1;
  google.protobuf.Struct contact = 2;
}

message FeedbackReceivedPayload {
  string feedback_id = 1;
  optional string related_event_id = 2;
  google.protobuf.Struct outcome = 3;
  optional string operator_comment = 4;
}

message ContextCompacted {
  string level = 1;
  uint32 messages_before = 2;
  uint32 messages_after = 3;
  uint32 tokens_before = 4;
  uint32 tokens_after = 5;
  optional string summary = 6;
}

message Keepalive {
  optional uint32 tokens_used = 1;
  optional uint32 tokens_max = 2;
}

message Pong {}

// Categorises a tool for UI presence decisions.
enum ToolCategoryHint {
  TOOL_CATEGORY_UNSPECIFIED = 0;
  TOOL_CATEGORY_PHYSICAL = 1;
  TOOL_CATEGORY_PURE = 2;
}

message ToolSchema {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters_schema = 3;
  uint32 timeout_ms = 4;
  ToolCategoryHint category = 5;
}

message JointState {
  string name = 1;
  double position = 2;
  double velocity = 3;
  double effort = 4;
}

message Pose {
  double x = 1;
  double y = 2;
  double z = 3;
  double qx = 4;
  double qy = 5;
  double qz = 6;
  double qw = 7;
}

message TelemetryUpdate {
  string host_id = 1;
  double timestamp = 2;
  repeated JointState joint_states = 3;
  optional Pose end_effector_pose = 4;
  map<string, double> sensor_readings = 5;
}

message TaskProgress {
  string task_id = 1;
  string phase = 2;
  float progress = 3;
  string description = 4;
}

message WebRtcOffer {
  string host_id = 1;
  string sdp = 2;
  repeated string ice_candidates = 3;
  string peer_id = 4;
  repeated string camera_ids = 5;
}

message WebRtcAnswer {
  string host_id = 1;
  string sdp = 2;
  repeated string ice_candidates = 3;
  string peer_id = 4;
}

// Trickle ICE candidate exchanged between worker and client via server relay.
message IceCandidate {
  string host_id = 1;
  string peer_id = 2;
  string candidate = 3;
  string sdp_mid = 4;
  uint32 sdp_m_line_index = 5;
}

// Client requests specific cameras to stream.
message CameraRequest {
  string host_id = 1;
  repeated string camera_ids = 2;
}

// Server notifies client of camera changes (hot-plug).
message CameraUpdate {
  string host_id = 1;
  repeated CameraInfoProto cameras = 2;
  string event = 3;
}

message CameraInfoProto {
  string id = 1;
  string label = 2;
  uint32 width = 3;
  uint32 height = 4;
  uint32 fps = 5;
  bool hw_encoder = 6;
}

// --- WatchTeam RPC ---

message WatchTeamRequest {
  string task_id = 1;
}

// TeamEvent is the server-streaming response for WatchTeam.
// Each event describes a worker lifecycle transition.
message TeamEvent {
  oneof event {
    WorkerStarted worker_started = 1;
    WorkerPhase worker_phase = 2;
    WorkerToolCall worker_tool_call = 3;
    WorkerCompleted worker_completed = 4;
    WorkerFailed worker_failed = 5;
    WorkerExited worker_exited = 6;
    WorkerApprovalRequested worker_approval_requested = 7;
    WorkerApprovalResolved worker_approval_resolved = 8;
  }
}

message WorkerStarted {
  string worker_id = 1;
  string host_id = 2;
}

message WorkerPhase {
  string worker_id = 1;
  uint32 phase = 2;
  string mode = 3; // "react" or "ooda_react"
}

message WorkerToolCall {
  string worker_id = 1;
  string tool = 2;
}

message WorkerApprovalRequested {
  string worker_id = 1;
  string task_id = 2;
  string approval_id = 3;
  string tool_name = 4;
  string reason = 5;
  uint64 timeout_secs = 6;
}

message WorkerApprovalResolved {
  string worker_id = 1;
  string task_id = 2;
  string approval_id = 3;
  bool approved = 4;
  optional google.protobuf.Struct modifier = 5;
}

message WorkerCompleted {
  string worker_id = 1;
  string result = 2;
}

message WorkerFailed {
  string worker_id = 1;
  string reason = 2; // "e_stop" | "timeout" | "model_error" | "safety_violation"
}

message WorkerExited {
  string worker_id = 1;
  string parent_task_id = 2;
}
