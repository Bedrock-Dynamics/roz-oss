syntax = "proto3";
package substrate.sim.v2;

// Phase 25 v2 proto file (MAV-02 spec + D-08'/D-09 cleanup).
// v1 file at proto/substrate/sim/bridge.proto gains the ADDITIVE MavAutopilot
// autopilot=11 field on ReadinessState in Task 2; all other v1 existing fields
// are FROZEN at v1 (D-05' post-review reconciliation).
//
// Open Question #6 resolution (per 25-CONTEXT.md <cross_package_proto_guidance>):
//   * IMPORTED from v1: Transform3D, Vector3, Quaternion, JointCommandMode
//     - stable primitives. Reference as substrate.sim.X.
//   * RE-DECLARED in v2: FlightCommand, FlightCommandRequest, FlightCommandResponse,
//     SetEntityPoseRequest, JointCommandRequest - these gain new fields.
//   * NOT IN v2 AT ALL: ReadinessState, TelemetryFrame - stay in v1. The v1
//     TelemetryFrame.readiness=20 wire path is the canonical readiness carrier.
//     D-05' permits ONE additive field (autopilot) on v1 ReadinessState.

// [v2] imported from substrate.sim - stable primitives (Transform3D,
// Vector3, Quaternion, JointCommandMode). Do NOT re-declare these.
import "substrate/sim/bridge.proto";

// ============================================================
// Enums
// ============================================================

// MAV_RESULT mirror - MAVLink command-response disposition.
// Source: https://mavlink.io/en/messages/common.html#MAV_RESULT
//
// Per 25-CONTEXT.md D-08' (post-research reconciliation): proto3-safe shift
// by +1 vs. MAVLink's wire values. MAVLink wire has ACCEPTED=0..CANCELLED=6;
// proto3 requires the first enum value to be 0, so MAV_RESULT_UNSPECIFIED=0
// is reserved as the default-value sentinel and MAVLink values shift to 1-7.
// Translation between proto MavResult and MAVLink wire u8 lives at the
// boundary in crates/roz-mavlink/src/mav_result.rs (plan 25-05).
enum MavResult {
  MAV_RESULT_UNSPECIFIED = 0;            // proto3 default sentinel - never emitted by roz-mavlink
  MAV_RESULT_ACCEPTED = 1;               // wire 0: command accepted + executed
  MAV_RESULT_TEMPORARILY_REJECTED = 2;   // wire 1: valid but cannot execute at this time
  MAV_RESULT_DENIED = 3;                 // wire 2: invalid (e.g., invalid params)
  MAV_RESULT_UNSUPPORTED = 4;            // wire 3: not supported by the vehicle
  MAV_RESULT_FAILED = 5;                 // wire 4: valid but execution failed
  MAV_RESULT_IN_PROGRESS = 6;            // wire 5: long-running command executing now
  MAV_RESULT_CANCELLED = 7;              // wire 6: command cancelled
}

// MAV_FRAME subset used by Phase 25 position-bearing commands.
// Source: https://mavlink.io/en/messages/common.html#MAV_FRAME
// ABSENT on a message field -> LOCAL_ENU (matches v1 implicit convention
// per Open Question #3). Consumers MUST honor this default.
//
// NOTE (D-21, plan 25-09): Goto commands default `frame` to
// MAV_FRAME_GLOBAL_RELATIVE_ALT_INT - lat/lon * 1e7 + altitude AGL - which
// matches COMMAND_INT's encoding for GLOBAL_* frames. LocalEnu-based Goto
// is NOT supported in Phase 25.
enum MavFrame {
  MAV_FRAME_UNSPECIFIED = 0;              // proto3 default sentinel -> LOCAL_ENU behavior for non-Goto
  MAV_FRAME_GLOBAL = 1;                   // WGS84 lat/lon + MSL altitude (wire 0)
  MAV_FRAME_LOCAL_NED = 2;                // meters, North-East-Down from origin (wire 1)
  MAV_FRAME_GLOBAL_RELATIVE_ALT = 3;      // lat/lon + AGL altitude (wire 3)
  MAV_FRAME_LOCAL_ENU = 4;                // meters, East-North-Up (ROS/Gazebo) (wire 4)
  MAV_FRAME_GLOBAL_INT = 5;               // lat/lon * 1e7 + MSL altitude (wire 5)
  MAV_FRAME_GLOBAL_RELATIVE_ALT_INT = 6;  // lat/lon * 1e7 + AGL altitude (wire 6)
  MAV_FRAME_BODY_FRD = 7;                 // body-frame Forward-Right-Down (wire 12)
}

// MAV_AUTOPILOT subset - Phase 25 consumers use this to disambiguate
// PX4 vs ArduPilot mode-string translation tables without heuristics.
// Source: https://mavlink.io/en/messages/common.html#MAV_AUTOPILOT
// Added to v1 ReadinessState per D-05' in Task 2; v2 declares its own
// MavAutopilot enum (same shape as v1) so v2 consumers don't have to
// hop packages for the enum. v1 and v2 MavAutopilot are distinct Rust
// types after codegen but wire-compatible by value.
enum MavAutopilot {
  MAV_AUTOPILOT_UNSPECIFIED = 0;
  MAV_AUTOPILOT_GENERIC = 1;            // wire 0
  MAV_AUTOPILOT_PX4 = 2;                // wire 12 - PX4 Autopilot
  MAV_AUTOPILOT_ARDUPILOTMEGA = 3;      // wire 3  - ArduPilot
  MAV_AUTOPILOT_INVALID = 4;            // wire 8  - no valid autopilot
}

// FlightCommand - discrete MAVLink command dispatch (D-19 DiscreteCommandSink<FlightCommand>).
// Each variant carries a MAV_CMD_* citation + param1..7 layout in its
// doc-comment so downstream readers can cross-reference the MAVLink spec.
// Source of truth: https://mavlink.io/en/messages/common.html
enum FlightCommand {
  FLIGHT_COMMAND_UNSPECIFIED = 0;

  // MAV_CMD_COMPONENT_ARM_DISARM (400).
  //   param1: 1.0 = arm, 0.0 = disarm
  //   param2: 0.0 = safety-check, 21196.0 = force
  //   param3..7: unused
  // Frame: not applicable.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_COMPONENT_ARM_DISARM
  FLIGHT_COMMAND_ARM = 1;

  // MAV_CMD_COMPONENT_ARM_DISARM (400).
  //   param1: 0.0 (disarm path)
  //   param2..7: as ARM (force typically 0.0)
  // Frame: not applicable.
  FLIGHT_COMMAND_DISARM = 2;

  // MAV_CMD_NAV_TAKEOFF (22).
  //   param1: Pitch (deg, min desired)
  //   param2: unused
  //   param3: Flags (NAV_TAKEOFF_FLAGS)
  //   param4: Yaw (deg, NaN = default)
  //   param5: Latitude
  //   param6: Longitude
  //   param7: Altitude (m AGL)
  // Frame: implicit MAV_FRAME_GLOBAL_RELATIVE_ALT_INT per spec.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_NAV_TAKEOFF
  FLIGHT_COMMAND_TAKEOFF = 3;

  // MAV_CMD_NAV_LAND (21).
  //   param1: Abort Alt (m)
  //   param2: PRECISION_LAND_MODE
  //   param3: unused
  //   param4: Yaw (deg, NaN = default)
  //   param5: Latitude
  //   param6: Longitude
  //   param7: Landing Altitude (m)
  // Frame: MAV_FRAME_GLOBAL_INT per spec.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_NAV_LAND
  FLIGHT_COMMAND_LAND = 4;

  // MAV_CMD_NAV_RETURN_TO_LAUNCH (20).
  //   param1..7: all empty (0.0)
  // Frame: not applicable.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_NAV_RETURN_TO_LAUNCH
  FLIGHT_COMMAND_RTL = 5;

  // MAV_CMD_DO_SET_MODE (176).
  //   param1: MAV_MODE_FLAG
  //   param2: vendor custom_mode (u32; PX4 packs main|sub, ArduPilot uses plain mode id)
  //   param3: vendor custom_submode
  //   param4..7: unused
  // Frame: not applicable.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_DO_SET_MODE
  FLIGHT_COMMAND_SET_MODE = 6;

  // MAV_CMD_DO_REPOSITION (192).
  //   param1: Ground Speed (m/s, -1 = default)
  //   param2: MAV_DO_REPOSITION_FLAGS
  //   param3: Radius (m, 0 = default)
  //   param4: Yaw (deg, NaN = unchanged)
  //   param5: Latitude (ENCODED AS int32 lat * 1e7 when frame is GLOBAL_*_INT)
  //   param6: Longitude (ENCODED AS int32 lon * 1e7 when frame is GLOBAL_*_INT)
  //   param7: Altitude (m)
  // Frame: specified by FlightCommandRequest.frame. Per D-21 (post-review),
  // default is MAV_FRAME_GLOBAL_RELATIVE_ALT_INT. LocalEnu is rejected as
  // Unsupported in Phase 25 - it requires a future GotoLocal command
  // semantic rather than overloading COMMAND_INT's int32 x/y slots.
  // Source: https://mavlink.io/en/messages/common.html#MAV_CMD_DO_REPOSITION
  FLIGHT_COMMAND_GOTO = 7;
}

// ============================================================
// Messages - FlightCommand dispatch
// ============================================================

// [v2] re-declared - gains optional MavFrame per D-08/D-09.
message FlightCommandRequest {
  FlightCommand command = 1;
  double altitude_m = 2;
  double goto_x = 3;
  double goto_y = 4;
  double goto_z = 5;
  // Vendor canonical mode string (SET_MODE). Examples: "OFFBOARD" (PX4),
  // "GUIDED" (ArduPilot). Backend translates via
  // crates/roz-mavlink/src/modes/{px4,ardupilot}.rs.
  string mode = 6;
  // 1:1 worker:vehicle only in this build. Non-zero values return
  // MavResult::MAV_RESULT_UNSUPPORTED per 25-CONTEXT.md D-15/D-16.
  // Field retained for forward-compat when multi-vehicle lands - no proto
  // breakage required.
  uint32 vehicle_index = 7;
  // Explicit frame for position-bearing commands (GOTO).
  // Per D-21 (post-review): Goto REQUIRES frame to be one of the
  // GLOBAL_*_INT variants (lat/lon * 1e7 encoding). LocalEnu is
  // rejected as Unsupported in Phase 25.
  // Ignored for ARM/DISARM/RTL/SET_MODE. TAKEOFF uses implicit
  // GLOBAL_RELATIVE_ALT_INT per spec. LAND uses implicit GLOBAL_INT per spec.
  // ABSENT on Goto -> treated as MAV_FRAME_GLOBAL_RELATIVE_ALT_INT per D-21.
  // Per 25-CONTEXT.md D-08 + D-21.
  optional MavFrame frame = 8;
}

// [v2] re-declared - MavResult enum replaces v1 string; success bool dropped (D-09).
message FlightCommandResponse {
  // MavResult mirrors MAVLink MAV_RESULT exactly (with proto3 shift).
  // The legacy v1 bool-typed `success` field is DROPPED in v2 - truthiness
  // is derivable as result == MAV_RESULT_ACCEPTED || result == MAV_RESULT_IN_PROGRESS.
  // See 25-CONTEXT.md D-09.
  MavResult result = 1;
  // Structured error context. Empty on ACCEPTED/IN_PROGRESS.
  string error = 2;
}

// ============================================================
// Messages - Spatial commands (re-declared to add frame tag)
// ============================================================

// [v2] re-declared - gains optional MavFrame pose_frame per D-09.
// Parallels the MavFrame fix on FlightCommand so the ENU-vs-NED
// ambiguity doesn't recur here.
message SetEntityPoseRequest {
  string entity_name = 1;
  // [v2] imported from substrate.sim - stable primitive type (flat
  // x/y/z/qx/qy/qz/qw/sx/sy/sz per v1).
  substrate.sim.Transform3D pose = 2;
  string world_name = 3;
  // ABSENT -> LOCAL_ENU (matches v1 implicit convention).
  optional MavFrame pose_frame = 4;
}

// [v2] re-declared - gains optional MavFrame positions_frame per D-09.
// Mode enum imported from v1 - stable (JOINT_POSITION=1, JOINT_VELOCITY=2,
// no EFFORT variant in v1, do not fabricate one).
message JointCommandRequest {
  // [v2] imported from substrate.sim - stable enum.
  substrate.sim.JointCommandMode mode = 1;
  repeated string joint_names = 2;
  repeated double values = 3;
  string world_name = 4;
  string robot_class = 5;
  string owner_id = 6;
  bool acquire_low_level_if_needed = 7;
  // ABSENT -> LOCAL_ENU (matches v1 implicit convention). Frame applies
  // to values[] when mode == JOINT_POSITION and the robot has a floating
  // base; ignored for joint-space velocity modes.
  optional MavFrame positions_frame = 8;
}
