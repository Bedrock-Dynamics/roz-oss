app = "roz-api-dev"
primary_region = "sjc"
kill_signal = "SIGTERM"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "immediate"

[env]
  RUST_LOG = "info,roz_server=debug"
  PORT = "8080"
  # gRPC multiplexed on PORT with REST (no separate GRPC_PORT needed)
  ROZ_BASE_URL = "https://roz-api-dev.fly.dev"
  ROZ_ENVIRONMENT = "development"
  ROZ_DEFAULT_MODEL = "claude-sonnet-4-6"
  ROZ_MODEL_TIMEOUT_SECS = "120"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1gb"
  count = 1

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.http_options]
    h2_backend = true

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/v1/health"
  timeout = "5s"

# gRPC is now multiplexed with REST on [http_service] port via h2_backend

# Restate TaskWorkflow endpoint (internal only, for Restate service discovery)
[[services]]
  internal_port = 9080
  protocol = "tcp"
