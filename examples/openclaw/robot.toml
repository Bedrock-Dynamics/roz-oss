[robot]
name = "openclaw-reference"
description = "Reference 6-DOF OpenClaw-class manipulator — fixture target for FW-07 / Plan 26.10-09 framework-fidelity tests (Dynamixel-style serial bus + gripper TCP + force-torque + wrist camera)"

[robot.embodiment_family]
family_id = "openclaw"
description = "OpenClaw-class manipulator reference architecture (Roz framework-fidelity validation; not a vendor SKU)"

[safety]
e_stop_behavior = "hold_position"
watchdog_timeout_ms = 500
max_contact_force_n = 100.0

# ----------------------------------------------------------------------------
# Authoritative joint schema (FW-06 — Plan 26.10-02)
#
# Each joint declares the FULL `roz_core::embodiment::model::Joint` shape:
#   joint_type, parent_link, child_link, axis, origin (Transform3D), limits.
#
# Limits MUST carry every `JointSafetyLimits` field — no INFINITY synthesis on
# the production parse path. `max_torque` is `Option<f64>`; omit the key for
# `None`, present a literal value for `Some(_)`.
#
# OpenClaw reference topology (6-DOF serial chain — Dynamixel-style):
#   joint_0 : base_link    -> link_0  (axis [0,0,1])  — base rotate
#   joint_1 : link_0       -> link_1  (axis [0,1,0])  — shoulder pitch
#   joint_2 : link_1       -> link_2  (axis [0,1,0])  — elbow pitch
#   joint_3 : link_2       -> link_3  (axis [1,0,0])  — wrist roll
#   joint_4 : link_3       -> link_4  (axis [0,1,0])  — wrist pitch
#   joint_5 : link_4       -> link_5  (axis [1,0,0])  — wrist final roll (gripper drive)
#
# Transform3D rotation is `[w, x, y, z]`; identity is [1, 0, 0, 0].
# `timestamp_ns` is omitted in TOML and defaulted to 0 by the parser.
# ----------------------------------------------------------------------------

[[joints]]
name = "joint_0"
joint_type = "revolute"
parent_link = "base_link"
child_link = "link_0"
axis = [0.0, 0.0, 1.0]

[joints.origin]
translation = [0.0, 0.0, 0.05]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -3.14159
position_max = 3.14159
max_velocity = 2.5
max_acceleration = 4.0
max_jerk = 40.0
max_torque = 8.4

[[joints]]
name = "joint_1"
joint_type = "revolute"
parent_link = "link_0"
child_link = "link_1"
axis = [0.0, 1.0, 0.0]

[joints.origin]
translation = [0.0, 0.0, 0.04]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -1.5708
position_max = 1.5708
max_velocity = 2.5
max_acceleration = 4.0
max_jerk = 40.0
max_torque = 8.4

[[joints]]
name = "joint_2"
joint_type = "revolute"
parent_link = "link_1"
child_link = "link_2"
axis = [0.0, 1.0, 0.0]

[joints.origin]
translation = [0.0, 0.0, 0.12]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -1.5708
position_max = 1.5708
max_velocity = 2.5
max_acceleration = 4.0
max_jerk = 40.0
max_torque = 6.3

[[joints]]
name = "joint_3"
joint_type = "revolute"
parent_link = "link_2"
child_link = "link_3"
axis = [1.0, 0.0, 0.0]

[joints.origin]
translation = [0.0, 0.0, 0.10]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -3.14159
position_max = 3.14159
max_velocity = 3.5
max_acceleration = 5.0
max_jerk = 50.0
max_torque = 4.1

[[joints]]
name = "joint_4"
joint_type = "revolute"
parent_link = "link_3"
child_link = "link_4"
axis = [0.0, 1.0, 0.0]

[joints.origin]
translation = [0.0, 0.0, 0.06]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -1.5708
position_max = 1.5708
max_velocity = 3.5
max_acceleration = 5.0
max_jerk = 50.0
max_torque = 4.1

[[joints]]
name = "joint_5"
joint_type = "revolute"
parent_link = "link_4"
child_link = "link_5"
axis = [1.0, 0.0, 0.0]

[joints.origin]
translation = [0.0, 0.0, 0.04]
rotation = [1.0, 0.0, 0.0, 0.0]

[joints.limits]
position_min = -3.14159
position_max = 3.14159
max_velocity = 4.0
max_acceleration = 6.0
max_jerk = 60.0
max_torque = 2.5

# ----------------------------------------------------------------------------
# Tool center points
# ----------------------------------------------------------------------------

[[tcps]]
name = "gripper_tcp"
parent_link = "link_5"
tcp_type = "gripper"

[tcps.offset]
translation = [0.0, 0.0, 0.085]
rotation = [1.0, 0.0, 0.0, 0.0]

[[tcps]]
name = "tool_mount"
parent_link = "link_5"
tcp_type = "tool"

[tcps.offset]
translation = [0.0, 0.0, 0.06]
rotation = [1.0, 0.0, 0.0, 0.0]

# ----------------------------------------------------------------------------
# Sensor mounts
# ----------------------------------------------------------------------------

[[sensor_mounts]]
sensor_id = "wrist_force_torque"
parent_link = "link_5"
sensor_type = "force_torque"
is_actuated = false

[sensor_mounts.offset]
translation = [0.0, 0.0, 0.02]
rotation = [1.0, 0.0, 0.0, 0.0]

[[sensor_mounts]]
sensor_id = "wrist_camera"
parent_link = "link_5"
sensor_type = "camera"
is_actuated = false

[sensor_mounts.offset]
translation = [0.04, 0.0, 0.0]
rotation = [1.0, 0.0, 0.0, 0.0]

# ----------------------------------------------------------------------------
# Workspace zones
# ----------------------------------------------------------------------------

[[workspace_zones]]
name = "safe_envelope"
origin_frame = "base_link"
zone_type = "allowed"
margin_m = 0.05

[workspace_zones.shape.sphere]
radius = 0.6

# ----------------------------------------------------------------------------
# Channel manifest (legacy — preserved for control surface)
# ----------------------------------------------------------------------------

[channels]
robot_id = "openclaw-reference"
robot_class = "manipulator"
control_rate_hz = 100

[[channels.commands]]
name = "joint_0"
type = "velocity"
unit = "rad/s"
limits = [-2.5, 2.5]
max_rate_of_change = 0.4
position_state_index = 0

